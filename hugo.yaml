baseURL: https://zainportfoli0.netlify.app/
title: "Zain Ul Abideen | MERN Stack Developer"

module:
  imports:
    - path: github.com/hugo-toha/toha/v4
  mounts:
    - source: static/files
      target: static/files
    - source: ./node_modules/flag-icons/flags
      target: static/flags
    - source: ./node_modules/@fontsource/mulish/files
      target: static/files
    - source: ./node_modules/katex/dist/fonts
      target: static/fonts

defaultContentLanguage: en

languages:
  en:
    locale: en
    label: English
    title: "Zain Ul Abideen | MERN Stack Developer"
    weight: 1

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

enableEmoji: true

params:
  background: /images/site/background.jpg

  # No logo — shows site title as text in navbar cleanly
  logo:
    main: ""
    inverted: ""
    favicon: ""

  gitRepo: https://github.com/ZAYNINFINITY/my-portfolio
  gitBranch: main

  topNavbar:
    maxVisibleSections: 6

  features:
    theme:
      enable: true
      services:
        light: true
        dark: true
        default: dark

    portfolio:
      enable: true

    blog:
      enable: false

    notes:
      enable: false

    comment:
      enable: false

    analytics:
      enable: false

    toc:
      enable: true

    tags:
      enable: true

    flags:
      enable: false

    syntaxHighlight:
      enable: true

    copyCodeButton:
      enable: true

    pagination:
      maxPostsPerPage: 12

  footer:
    enable: true
    template: footer.html
    navigation:
      enable: true
      customMenus: false
    contactMe:
      enable: true
    credentials:
      enable: false
    newsletter:
      enable: false
    disclaimer:
      enable: false

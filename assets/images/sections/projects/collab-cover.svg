      <text x="335" y="591" fill="#B0B2B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="500">Work together with your team in real-time</text>

      <rect x="803" y="496" width="412" height="108" rx="14" fill="#151517" stroke="#323238"/>
      <rect x="830" y="513" width="16" height="17" rx="4" fill="#66E3F7"/>
      <rect x="833" y="506" width="10" height="12" rx="5" fill="#66E3F7"/>
      <text x="813" y="564" fill="#F3F3F5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">SECURE &amp; PRIVATE</text>
      <text x="813" y="591" fill="#B0B2B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="500">Your data is encrypted and secure</text>
    </g>

    <g>
      <rect x="325" y="621" width="412" height="108" rx="14" fill="#151517" stroke="#323238"/>
      <circle cx="353" cy="647" r="7" fill="#66E3F7"/>
      <rect x="349" y="643" width="8" height="8" rx="4" fill="#66E3F7"/>
      <text x="335" y="689" fill="#F3F3F5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">REAL-TIME SYNC</text>
      <text x="335" y="716" fill="#B0B2B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="500">Changes sync instantly across all devices</text>

      <rect x="803" y="621" width="412" height="108" rx="14" fill="#151517" stroke="#323238"/>
      <path d="M833 646l18-8-5 9 8 4-18 8 5-9-8-4Z" fill="#66E3F7"/>
      <text x="813" y="689" fill="#F3F3F5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">LIGHTNING FAST</text>

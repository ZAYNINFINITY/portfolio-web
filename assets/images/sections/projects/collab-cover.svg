      <stop stop-color="#050505"/>
      <stop offset="0.55" stop-color="#0B0710"/>
      <stop offset="1" stop-color="#090B14"/>
    </linearGradient>
    <linearGradient id="panel" x1="260" y1="90" x2="1340" y2="810" gradientUnits="userSpaceOnUse">

summary: 'I am a CS student at **Pak-Austria Fachhochschule Institute of Applied Sciences and Technology, Islamabad**, building full-stack web products from idea to deployment. My stack is MERN — [React](https://react.dev/) on the frontend, [Node.js](https://nodejs.org/) and Express on the backend, [MongoDB](https://www.mongodb.com/) for data. I have shipped real-time collaboration tools, e-commerce sites, cross-platform apps, and CLI games. I care deeply about how things work under the hood — whether it is designing an auth flow with OAuth 2.0, architecting a real-time event system with Socket.io, or writing clean C++ for a data structures project. Currently open to **internships** and **junior developer roles**.'


summary: "I'm a CS student at PAF-IAST, Islamabad. I build full-stack web apps with React, Node.js, Express, and MongoDB. Some stuff I've made: a real-time collab tool with live chat and Kanban boards, an e-commerce site for a local sanitary business that's actually live, a Chrome extension for tracking Instagram Reels with friend duels, and a few C++ games and DSA projects. I like figuring out how things work — OAuth login, Socket.io events, data structures. Looking for internships and junior roles."

